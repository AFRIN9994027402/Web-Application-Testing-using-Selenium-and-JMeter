apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-task
spec:
  steps:
    - name: cleanup
      image: ubuntu
      script: |
        #!/bin/bash
        echo "Cleaning up workspace..."
        rm -rf *

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test-task
spec:
  steps:
    - name: run-tests
      image: python:3.10
      script: |
        #!/bin/bash
        pip install nose
        echo "Running unit tests..."
        nosetests
